AWSTemplateFormatVersion: "2010-09-09"
Description: Keyless GitHub Actions deployment role and optional EC2 SSM instance profile for CitePilot

Parameters:
  GitHubOwner:
    Type: String
    Default: akki-g
    AllowedPattern: "[A-Za-z0-9_.-]+"
  GitHubRepository:
    Type: String
    Default: CitePilot
    AllowedPattern: "[A-Za-z0-9_.-]+"
  InstanceId:
    Type: AWS::EC2::Instance::Id
  CreateGitHubOidcProvider:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Set false when token.actions.githubusercontent.com already exists in this AWS account
  ExistingGitHubOidcProviderArn:
    Type: String
    Default: ""
    Description: Required when CreateGitHubOidcProvider is false

Conditions:
  ShouldCreateGitHubOidcProvider: !Equals [!Ref CreateGitHubOidcProvider, "true"]

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateGitHubOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      Tags:
        - Key: Application
          Value: CitePilot

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub citepilot-github-deploy-${AWS::Region}
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - ShouldCreateGitHubOidcProvider
                - !Ref GitHubOidcProvider
                - !Ref ExistingGitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOwner}/${GitHubRepository}:environment:production
      Policies:
        - PolicyName: RunCitePilotDeployment
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ssm:SendCommand
                Resource:
                  - !Sub arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/${InstanceId}
                  - !Sub arn:${AWS::Partition}:ssm:${AWS::Region}::document/AWS-RunShellScript
              - Effect: Allow
                Action:
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                Resource: "*"

  CitePilotInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub citepilot-ec2-ssm-${AWS::Region}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  CitePilotInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub citepilot-ec2-ssm-${AWS::Region}
      Roles:
        - !Ref CitePilotInstanceRole

Outputs:
  GitHubDeployRoleArn:
    Description: Set this as the GitHub production environment variable AWS_DEPLOY_ROLE_ARN
    Value: !GetAtt GitHubDeployRole.Arn
  InstanceProfileName:
    Description: Attach this profile only if the EC2 instance does not already have an IAM profile
    Value: !Ref CitePilotInstanceProfile
